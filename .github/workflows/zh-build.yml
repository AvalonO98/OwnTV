name: 汉化版本编译

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取上游最新版本号
        run: |
          git remote add upstream https://github.com/ahXN00/OwnTV.git 2>/dev/null || true
          git fetch upstream --tags --quiet
          LATEST=$(git tag -l "v*" --sort=-v:refname | head -n1)
          VER="${LATEST#v}-zh"
          echo "Upstream: $LATEST  →  Version: $VER"
          echo "name=$VER" >> $GITHUB_OUTPUT
          echo "code=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        id: ver

      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 解码签名密钥（如有）
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "已配置 release 签名"
          else
            echo "未配置签名密钥，将构建 debug APK（可安装）"
          fi

      - name: 构建 APK
        env:
          VERSION_NAME: ${{ steps.ver.outputs.name }}
          VERSION_CODE: ${{ steps.ver.outputs.code }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "构建签名 release APK"
            ./gradlew assembleRelease --stacktrace --no-daemon
            APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          else
            echo "构建 debug APK（已签名，可直接安装）"
            ./gradlew assembleDebug --stacktrace --no-daemon
            APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          fi
          OUT="OwnTV-v${{ steps.ver.outputs.name }}.apk"
          cp "$APK" "$OUT"
          echo "apk=$OUT" >> $GITHUB_ENV

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: OwnTV-v${{ steps.ver.outputs.name }}
          path: ${{ env.apk }}
          retention-days: 30

      - name: 发布 Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "OwnTV 汉化版 v${{ steps.ver.outputs.name }}"
          tag_name: "v${{ steps.ver.outputs.name }}"
          body: "基于上游 ${{ steps.ver.outputs.name }} 的简体中文汉化版本。"
          files: ${{ env.apk }}
          prerelease: false